name: 'Run GN example build'
description: 'Build Silabs example app using the GN build system based on the provided arguments'
author: 'Silicon Labs'

inputs:
  example-app:
    description: 'Example app name to build'
    required: true
  path-to-example-app:
    description: 'Path to the example app directory to be built'
    required: true
  json-file-path:
    description: 'JSON content to be used as GN args'
    required: true
  build-script:
    description: 'Build script to be executed for the provided example app'
    required: true
  output-directory:
    description: 'Output directory for the build artifacts'
    required: true
  build-type:
    description: 'Type of build to be executed'
    required: true
  continue-on-error:
    description: 'If true, continue executing remaining build combinations even if a previous build fails. Failed builds are surfaced as errors and the action will be marked as failed at the end if any build failed.'
    required: false
    default: 'false'

runs:
  using: 'node24'
  main: dist/index.js